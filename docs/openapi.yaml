openapi: 3.1.0
info:
  title: Personal Blog API
  version: 0.6.0
  description: |
    个人博客 HTTP API 契约。已提供内容、互动与管理后台，并补齐阶段五的
    Redis 缓存、浏览统计、统一限流、一次性验证码、安全头和隐私治理。
servers:
  - url: /api/v1
    description: 当前站点
tags:
  - name: Infrastructure
    description: 运行状态与基础设施
  - name: Public
    description: 公开博客接口
  - name: Auth
    description: 管理员认证接口
  - name: Admin
    description: 管理后台接口
paths:
  /status:
    get:
      operationId: getInfrastructureStatus
      summary: 获取 API 运行状态
      tags:
        - Infrastructure
      responses:
        "200":
          description: API 正常运行
          headers:
            Cache-Control:
              schema:
                type: string
              description: 状态接口不缓存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        default:
          $ref: "#/components/responses/Problem"
  /public/home:
    get:
      operationId: getPublicHome
      summary: 获取首页聚合内容
      tags: [Public]
      responses:
        "200":
          description: 首页文章与分类标签
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHome"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles:
    get:
      operationId: listPublicArticles
      summary: 查询已发布公开文章
      tags: [Public]
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 100
        - name: category
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: 公开文章分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticlePage"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{slug}:
    get:
      operationId: getPublicArticle
      summary: 获取公开文章详情
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/ArticleSlug"
      responses:
        "200":
          description: 公开文章详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticleDetail"
        "301":
          description: slug 已变更
          headers:
            Location:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{slug}/adjacent:
    get:
      operationId: getPublicArticleAdjacent
      summary: 获取上一篇和下一篇
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/ArticleSlug"
      responses:
        "200":
          description: 相邻文章
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticleNavigation"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{slug}/related:
    get:
      operationId: getRelatedPublicArticles
      summary: 获取相关文章
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/ArticleSlug"
      responses:
        "200":
          description: 最多三篇相关文章
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicArticleCard"
        default:
          $ref: "#/components/responses/Problem"
  /public/categories:
    get:
      operationId: listPublicCategories
      summary: 查询公开分类
      tags: [Public]
      responses:
        "200":
          description: 分类列表与公开文章数
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicTaxonomy"
        default:
          $ref: "#/components/responses/Problem"
  /public/categories/{slug}/articles:
    get:
      operationId: listPublicCategoryArticles
      summary: 查询分类下的公开文章
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/ArticleSlug"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: 分类文章分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticlePage"
        default:
          $ref: "#/components/responses/Problem"
  /public/tags:
    get:
      operationId: listPublicTags
      summary: 查询公开标签
      tags: [Public]
      responses:
        "200":
          description: 标签列表与公开文章数
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicTaxonomy"
        default:
          $ref: "#/components/responses/Problem"
  /public/tags/{slug}/articles:
    get:
      operationId: listPublicTagArticles
      summary: 查询标签下的公开文章
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/ArticleSlug"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: 标签文章分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticlePage"
        default:
          $ref: "#/components/responses/Problem"
  /public/archives:
    get:
      operationId: getPublicArchives
      summary: 按年月获取文章归档
      tags: [Public]
      responses:
        "200":
          description: 月份倒序的文章归档
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicArchiveMonth"
        default:
          $ref: "#/components/responses/Problem"
  /public/search:
    get:
      operationId: searchPublicArticles
      summary: 搜索公开文章
      tags: [Public]
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: 搜索结果分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticlePage"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{articleId}/comments:
    get:
      operationId: listPublicArticleComments
      summary: 获取已审核文章评论树
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/PublicArticleId"
      responses:
        "200":
          description: 两级评论树
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicComment"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: submitArticleComment
      summary: 提交文章评论或回复
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/PublicArticleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentRequest"
      responses:
        "202":
          description: 已进入审核队列
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSubmitResponse"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{articleId}/views:
    post:
      operationId: recordArticleView
      summary: 记录一次文章浏览
      description: 浏览量先写入 Redis 计数器，再由后台任务批量同步到数据库。
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/PublicArticleId"
      responses:
        "202":
          description: 浏览事件已接收
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewCountResponse"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{articleId}/interaction:
    get:
      operationId: getArticleInteraction
      summary: 获取文章点赞和评论状态
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/PublicArticleId"
      responses:
        "200":
          description: 当前匿名访客互动状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionState"
        default:
          $ref: "#/components/responses/Problem"
  /public/articles/{articleId}/likes:
    post:
      operationId: likeArticle
      summary: 点赞文章
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/PublicArticleId"
      responses:
        "200":
          description: 点赞后互动状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionState"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: unlikeArticle
      summary: 取消点赞
      tags: [Public]
      parameters:
        - $ref: "#/components/parameters/PublicArticleId"
      responses:
        "200":
          description: 取消后互动状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionState"
        default:
          $ref: "#/components/responses/Problem"
  /public/messages:
    get:
      operationId: listPublicMessages
      summary: 获取已审核留言
      tags: [Public]
      responses:
        "200":
          description: 留言树
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicComment"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: submitMessage
      summary: 提交留言或回复
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentRequest"
      responses:
        "202":
          description: 已进入审核队列
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSubmitResponse"
        default:
          $ref: "#/components/responses/Problem"
  /public/captcha:
    get:
      operationId: issueCaptcha
      summary: 获取一次性算术验证码
      description: 验证码默认五分钟过期，校验成功或失败后都会失效。
      tags: [Public]
      responses:
        "200":
          description: 新验证码挑战
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptchaChallenge"
        default:
          $ref: "#/components/responses/Problem"
  /auth/login:
    post:
      operationId: login
      summary: 管理员登录
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，同时设置 HttpOnly Refresh Cookie 和 CSRF Cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/Problem"
  /auth/refresh:
    post:
      operationId: refreshSession
      summary: 轮换刷新会话
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: 刷新成功并轮换 Cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/Problem"
  /auth/logout:
    post:
      operationId: logout
      summary: 注销当前刷新会话
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: 注销完成
        default:
          $ref: "#/components/responses/Problem"
  /auth/logout-all:
    post:
      operationId: logoutAll
      summary: 注销当前管理员的全部刷新会话
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: 全部会话已撤销
        default:
          $ref: "#/components/responses/Problem"
  /auth/me:
    get:
      operationId: getCurrentAdmin
      summary: 获取当前管理员
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前管理员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Problem"
  /auth/password:
    put:
      operationId: changePassword
      summary: 修改当前管理员密码并撤销全部刷新会话
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
      responses:
        "204":
          description: 密码修改成功
        default:
          $ref: "#/components/responses/Problem"
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      summary: 获取后台数据看板
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 内容、互动、访问、通知与健康汇总
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        default:
          $ref: "#/components/responses/Problem"
  /admin/comments:
    get:
      operationId: listAdminComments
      summary: 分页查询评论与留言
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, SPAM, HIDDEN]
        - name: type
          in: query
          schema:
            type: string
            enum: [ARTICLE, MESSAGE]
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 互动审核分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCommentPage"
        default:
          $ref: "#/components/responses/Problem"
  /admin/comments/{id}/approve:
    post:
      operationId: approveComment
      summary: 审核通过评论或留言
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: 审核成功
        default:
          $ref: "#/components/responses/Problem"
  /admin/comments/{id}/reject:
    post:
      operationId: rejectComment
      summary: 拒绝评论或留言
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: 已拒绝
        default:
          $ref: "#/components/responses/Problem"
  /admin/comments/{id}/reply:
    post:
      operationId: replyComment
      summary: 管理员回复评论或留言
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 2
                  maxLength: 2000
      responses:
        "200":
          description: 已发布管理员回复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicComment"
        default:
          $ref: "#/components/responses/Problem"
  /admin/operation-logs:
    get:
      operationId: listOperationLogs
      summary: 查询管理操作日志
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 操作日志分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationLogPage"
        default:
          $ref: "#/components/responses/Problem"
  /admin/articles:
    get:
      operationId: listAdminArticles
      summary: 分页查询文章
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ArticleStatus"
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 文章分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticlePage"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createArticle
      summary: 新建文章草稿
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpsertRequest"
      responses:
        "201":
          description: 草稿已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        default:
          $ref: "#/components/responses/Problem"
  /admin/articles/{id}:
    parameters:
      - $ref: "#/components/parameters/ArticleId"
    get:
      operationId: getAdminArticle
      summary: 获取文章编辑详情
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 文章编辑详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        default:
          $ref: "#/components/responses/Problem"
    put:
      operationId: updateArticle
      summary: 更新文章
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpsertRequest"
      responses:
        "200":
          description: 文章已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteArticle
      summary: 软删除文章
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: 文章已移入归档
        default:
          $ref: "#/components/responses/Problem"
  /admin/articles/{id}/publish:
    post:
      operationId: publishArticle
      summary: 发布文章
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: 文章已发布
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        default:
          $ref: "#/components/responses/Problem"
  /admin/articles/{id}/withdraw:
    post:
      operationId: withdrawArticle
      summary: 撤回文章为草稿
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: 文章已撤回
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        default:
          $ref: "#/components/responses/Problem"
  /admin/categories/options:
    get:
      operationId: listCategoryOptions
      summary: 获取可见分类选项
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 分类选项
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonomyOption"
        default:
          $ref: "#/components/responses/Problem"
  /admin/tags/options:
    get:
      operationId: listTagOptions
      summary: 获取可见标签选项
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 标签选项
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonomyOption"
        default:
          $ref: "#/components/responses/Problem"
  /admin/markdown/preview:
    post:
      operationId: previewMarkdown
      summary: 安全渲染 Markdown 预览
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkdownPreviewRequest"
      responses:
        "200":
          description: 渲染结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkdownPreviewResponse"
        default:
          $ref: "#/components/responses/Problem"
  /admin/categories:
    get:
      operationId: listAdminCategories
      summary: 查询全部分类
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 分类列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonomyItem"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createCategory
      summary: 新建分类
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyRequest"
      responses:
        "201":
          description: 分类已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyItem"
        default:
          $ref: "#/components/responses/Problem"
  /admin/categories/{id}:
    parameters:
      - $ref: "#/components/parameters/TaxonomyId"
    put:
      operationId: updateCategory
      summary: 更新分类
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyRequest"
      responses:
        "200":
          description: 分类已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyItem"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteCategory
      summary: 删除分类
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: 分类已删除
        default:
          $ref: "#/components/responses/Problem"
  /admin/tags:
    get:
      operationId: listAdminTags
      summary: 查询全部标签
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 标签列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonomyItem"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createTag
      summary: 新建标签
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyRequest"
      responses:
        "201":
          description: 标签已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyItem"
        default:
          $ref: "#/components/responses/Problem"
  /admin/tags/{id}:
    parameters:
      - $ref: "#/components/parameters/TaxonomyId"
    put:
      operationId: updateTag
      summary: 更新标签
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyRequest"
      responses:
        "200":
          description: 标签已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyItem"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteTag
      summary: 删除标签
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: 标签已删除
        default:
          $ref: "#/components/responses/Problem"
  /admin/media/config:
    get:
      operationId: getMediaConfig
      summary: 获取媒体上传能力状态
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 上传配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaConfig"
        default:
          $ref: "#/components/responses/Problem"
  /admin/media:
    get:
      operationId: listMedia
      summary: 分页查询媒体
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 24
      responses:
        "200":
          description: 媒体分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaPage"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: uploadMedia
      summary: 上传图片到 OSS
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                altText:
                  type: string
                  maxLength: 300
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        default:
          $ref: "#/components/responses/Problem"
  /admin/media/{id}:
    parameters:
      - $ref: "#/components/parameters/MediaId"
    put:
      operationId: updateMedia
      summary: 更新图片替代文本
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                altText:
                  type:
                    - string
                    - "null"
                  maxLength: 300
      responses:
        "200":
          description: 媒体已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteMedia
      summary: 删除未引用媒体
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: 媒体已删除
        default:
          $ref: "#/components/responses/Problem"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ArticleSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    ArticleId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    PublicArticleId:
      name: articleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TaxonomyId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    MediaId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
  responses:
    Problem:
      description: RFC 9457 问题详情
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
  schemas:
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - application
        - status
        - timestamp
      properties:
        application:
          type: string
          example: personal-blog-api
        status:
          type: string
          const: ok
        timestamp:
          type: string
          format: date-time
    PublicTaxonomy:
      type: object
      additionalProperties: false
      required: [id, name, slug, articleCount]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        description:
          type:
            - string
            - "null"
        articleCount:
          type: integer
          format: int64
          minimum: 0
    PublicArticleCard:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - slug
        - pinned
        - readingMinutes
        - viewCount
        - publishedAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        slug:
          type: string
        summary:
          type:
            - string
            - "null"
        categoryName:
          type:
            - string
            - "null"
        categorySlug:
          type:
            - string
            - "null"
        pinned:
          type: boolean
        readingMinutes:
          type: integer
          minimum: 0
        viewCount:
          type: integer
          format: int64
          minimum: 0
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PublicArticlePage:
      type: object
      additionalProperties: false
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PublicArticleCard"
        total:
          type: integer
          format: int64
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
        totalPages:
          type: integer
          minimum: 0
    PublicArticleDetail:
      allOf:
        - $ref: "#/components/schemas/PublicArticleCard"
        - type: object
          required:
            - contentHtml
            - tags
            - allowComment
            - wordCount
          properties:
            contentHtml:
              type: string
            tags:
              type: array
              items:
                $ref: "#/components/schemas/PublicTaxonomy"
            allowComment:
              type: boolean
            wordCount:
              type: integer
              minimum: 0
            metaTitle:
              type:
                - string
                - "null"
            metaDescription:
              type:
                - string
                - "null"
            canonicalUrl:
              type:
                - string
                - "null"
              format: uri
    PublicArticleNavigation:
      type: object
      additionalProperties: false
      required: [previous, next]
      properties:
        previous:
          oneOf:
            - $ref: "#/components/schemas/PublicArticleCard"
            - type: "null"
        next:
          oneOf:
            - $ref: "#/components/schemas/PublicArticleCard"
            - type: "null"
    PublicArchiveMonth:
      type: object
      additionalProperties: false
      required: [year, month, articles]
      properties:
        year:
          type: integer
        month:
          type: integer
          minimum: 1
          maximum: 12
        articles:
          type: array
          items:
            $ref: "#/components/schemas/PublicArticleCard"
    PublicHome:
      type: object
      additionalProperties: false
      required: [featured, latest, categories, tags, articleCount]
      properties:
        featured:
          type: array
          items:
            $ref: "#/components/schemas/PublicArticleCard"
        latest:
          type: array
          items:
            $ref: "#/components/schemas/PublicArticleCard"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/PublicTaxonomy"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/PublicTaxonomy"
        articleCount:
          type: integer
          format: int64
          minimum: 0
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 64
        password:
          type: string
          format: password
          maxLength: 200
    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 12
          maxLength: 200
    AuthResponse:
      type: object
      additionalProperties: false
      required: [accessToken, expiresAt, user]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      additionalProperties: false
      required: [id, username, nickname, role]
      properties:
        id:
          type: string
        username:
          type: string
        nickname:
          type: string
        email:
          type:
            - string
            - "null"
          format: email
        role:
          type: string
          enum: [ADMIN, DEMO]
    ArticleStatus:
      type: string
      enum: [DRAFT, SCHEDULED, PUBLISHED, ARCHIVED]
    ArticleVisibility:
      type: string
      enum: [PUBLIC, PRIVATE]
    TaxonomyOption:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
    ArticleUpsertRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - slug
        - contentMarkdown
        - tagIds
        - visibility
        - pinned
        - allowComment
        - version
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 160
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        summary:
          type:
            - string
            - "null"
          maxLength: 600
        contentMarkdown:
          type: string
        categoryId:
          type:
            - integer
            - "null"
          format: int64
        tagIds:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: integer
            format: int64
        visibility:
          $ref: "#/components/schemas/ArticleVisibility"
        pinned:
          type: boolean
        allowComment:
          type: boolean
        metaTitle:
          type:
            - string
            - "null"
          maxLength: 200
        metaDescription:
          type:
            - string
            - "null"
          maxLength: 320
        canonicalUrl:
          type:
            - string
            - "null"
          maxLength: 500
        version:
          type: integer
          minimum: 0
    ArticleListItem:
      type: object
      required:
        - id
        - title
        - slug
        - status
        - visibility
        - pinned
        - wordCount
        - viewCount
        - updatedAt
        - version
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        slug:
          type: string
        summary:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/ArticleStatus"
        visibility:
          $ref: "#/components/schemas/ArticleVisibility"
        pinned:
          type: boolean
        categoryName:
          type:
            - string
            - "null"
        wordCount:
          type: integer
        viewCount:
          type: integer
          format: int64
        publishedAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
    ArticlePage:
      type: object
      additionalProperties: false
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArticleListItem"
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
    ArticleDetail:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/ArticleListItem"
        - type: object
          required:
            - contentMarkdown
            - contentHtml
            - tagIds
            - allowComment
            - readingMinutes
            - createdAt
          properties:
            contentMarkdown:
              type: string
            contentHtml:
              type: string
            categoryId:
              type:
                - integer
                - "null"
              format: int64
            tagIds:
              type: array
              items:
                type: integer
                format: int64
            allowComment:
              type: boolean
            readingMinutes:
              type: integer
            metaTitle:
              type:
                - string
                - "null"
            metaDescription:
              type:
                - string
                - "null"
            canonicalUrl:
              type:
                - string
                - "null"
            createdAt:
              type: string
              format: date-time
    MarkdownPreviewRequest:
      type: object
      additionalProperties: false
      required: [markdown]
      properties:
        markdown:
          type: string
          maxLength: 1000000
    MarkdownPreviewResponse:
      type: object
      additionalProperties: false
      required: [html, plain, wordCount, readingMinutes]
      properties:
        html:
          type: string
        plain:
          type: string
        wordCount:
          type: integer
        readingMinutes:
          type: integer
    TaxonomyRequest:
      type: object
      additionalProperties: false
      required: [name, slug, sortOrder, visible]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        slug:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        description:
          type:
            - string
            - "null"
          maxLength: 300
        sortOrder:
          type: integer
          minimum: 0
        visible:
          type: boolean
    TaxonomyItem:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/TaxonomyOption"
        - type: object
          required:
            - sortOrder
            - visible
            - articleCount
            - createdAt
            - updatedAt
          properties:
            description:
              type:
                - string
                - "null"
            sortOrder:
              type: integer
            visible:
              type: boolean
            articleCount:
              type: integer
              format: int64
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    MediaConfig:
      type: object
      additionalProperties: false
      required: [configured, maxImageSize]
      properties:
        configured:
          type: boolean
        maxImageSize:
          type: integer
          format: int64
    MediaAsset:
      type: object
      additionalProperties: false
      required:
        - id
        - originalName
        - mediaType
        - extension
        - sizeBytes
        - status
        - referenceCount
        - url
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        originalName:
          type: string
        mediaType:
          type: string
        extension:
          type: string
        sizeBytes:
          type: integer
          format: int64
        width:
          type:
            - integer
            - "null"
        height:
          type:
            - integer
            - "null"
        altText:
          type:
            - string
            - "null"
        status:
          type: string
          enum: [PENDING, ACTIVE, ORPHAN, DELETED]
        referenceCount:
          type: integer
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
    MediaPage:
      type: object
      additionalProperties: false
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
    CommentRequest:
      type: object
      additionalProperties: false
      required: [nickname, content, notifyOnReply]
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 64
        email:
          type:
            - string
            - "null"
          format: email
          maxLength: 160
        website:
          type:
            - string
            - "null"
          format: uri
          maxLength: 300
        content:
          type: string
          minLength: 2
          maxLength: 2000
        parentId:
          type:
            - integer
            - "null"
          format: int64
        notifyOnReply:
          type: boolean
        captchaId:
          type:
            - string
            - "null"
          maxLength: 64
          description: 首次互动或高风险内容必须提供的一次性验证码 ID
        captchaAnswer:
          type:
            - string
            - "null"
          maxLength: 16
          description: 算术验证码答案
    CaptchaChallenge:
      type: object
      additionalProperties: false
      required: [id, question, expiresAt]
      properties:
        id:
          type: string
        question:
          type: string
          example: 7 + 5 = ?
        expiresAt:
          type: string
          format: date-time
    ViewCountResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean
    PublicComment:
      type: object
      additionalProperties: false
      required: [id, nickname, contentHtml, adminReply, createdAt, replies]
      properties:
        id:
          type: integer
          format: int64
        parentId:
          type:
            - integer
            - "null"
          format: int64
        nickname:
          type: string
        contentHtml:
          type: string
        adminReply:
          type: boolean
        createdAt:
          type: string
          format: date-time
        replies:
          type: array
          items:
            $ref: "#/components/schemas/PublicComment"
    CommentSubmitResponse:
      type: object
      additionalProperties: false
      required: [id, status, message]
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          const: PENDING
        message:
          type: string
    InteractionState:
      type: object
      additionalProperties: false
      required: [likeCount, commentCount, liked]
      properties:
        likeCount:
          type: integer
          format: int64
        commentCount:
          type: integer
          format: int64
        liked:
          type: boolean
    AdminComment:
      type: object
      required: [id, type, contentMarkdown, nickname, status, adminReply, createdAt]
      properties:
        id:
          type: integer
          format: int64
        articleId:
          type:
            - integer
            - "null"
          format: int64
        articleTitle:
          type:
            - string
            - "null"
        type:
          type: string
          enum: [ARTICLE, MESSAGE]
        contentMarkdown:
          type: string
        nickname:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, SPAM, HIDDEN]
        adminReply:
          type: boolean
        createdAt:
          type: string
          format: date-time
    AdminCommentPage:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminComment"
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
    OperationLog:
      type: object
      required: [id, module, action, result, createdAt]
      properties:
        id:
          type: integer
          format: int64
        operatorName:
          type:
            - string
            - "null"
        module:
          type: string
        action:
          type: string
        targetId:
          type:
            - string
            - "null"
        result:
          type: string
        createdAt:
          type: string
          format: date-time
    OperationLogPage:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OperationLog"
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
    Dashboard:
      type: object
      required:
        - articles
        - publishedArticles
        - comments
        - pendingComments
        - messages
        - likes
        - views30d
        - visitors30d
        - trend
        - popularArticles
        - recentOperations
        - pendingNotifications
        - mailConfigured
        - serviceStatus
        - cacheHits
        - cacheMisses
        - cacheErrors
        - cacheHitRate
      properties:
        articles: { type: integer, format: int64 }
        publishedArticles: { type: integer, format: int64 }
        comments: { type: integer, format: int64 }
        pendingComments: { type: integer, format: int64 }
        messages: { type: integer, format: int64 }
        likes: { type: integer, format: int64 }
        views30d: { type: integer, format: int64 }
        visitors30d: { type: integer, format: int64 }
        trend:
          type: array
          items:
            type: object
        popularArticles:
          type: array
          items:
            type: object
        recentOperations:
          type: array
          items:
            $ref: "#/components/schemas/OperationLog"
        pendingNotifications: { type: integer, format: int64 }
        mailConfigured: { type: boolean }
        serviceStatus: { type: string }
        cacheHits: { type: integer, format: int64 }
        cacheMisses: { type: integer, format: int64 }
        cacheErrors: { type: integer, format: int64 }
        cacheHitRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
    ProblemDetail:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        traceId:
          type: string
    Page:
      type: object
      required:
        - items
        - page
        - size
        - total
        - hasNext
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          format: int64
          minimum: 0
        hasNext:
          type: boolean
    CursorPage:
      type: object
      required:
        - items
        - hasNext
      properties:
        items:
          type: array
